<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.anthropic.com; img-src 'self' data:; worker-src 'none'" />
  <title>Vitality — Nutrition Calculator</title>

  <!-- Preconnects: font origins + AI endpoint (early TLS handshake) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://api.anthropic.com" crossorigin />

  <!-- Preload local scripts so the parser discovers them during head parse -->
  <link rel="preload" as="script" href="src/store/local-store.js" />
  <link rel="preload" as="script" href="data.js" />
  <link rel="preload" as="script" href="app.js" />

  <!-- Critical CSS: above-the-fold tokens + body + glow orbs + root placeholder.
       Mirrors input.css:5-35 and styles.css:9-17, 207-239. Keep in sync. -->
  <style>
    :root {
      --color-surface: 250 250 254;
      --color-on-surface: 26 28 31;
      --color-on-surface-variant: 67 71 78;
      --color-surface-container: 238 237 242;
      --color-surface-container-low: 243 243 247;
      --color-surface-container-high: 232 231 236;
      --color-surface-container-highest: 226 226 230;
      --color-surface-bright: 250 250 254;
      --color-surface-variant: 223 226 235;
      --color-outline: 113 119 134;
      --color-outline-variant: 193 198 215;
      --color-ring-bg: 0 0 0;
    }
    .dark {
      --color-surface: 0 0 0;
      --color-on-surface: 249 249 254;
      --color-on-surface-variant: 193 198 215;
      --color-surface-container: 18 20 23;
      --color-surface-container-low: 10 10 12;
      --color-surface-container-high: 28 30 34;
      --color-surface-container-highest: 40 42 47;
      --color-surface-bright: 26 28 31;
      --color-surface-variant: 46 48 52;
      --color-outline: 113 119 134;
      --color-outline-variant: 193 198 215;
      --color-ring-bg: 255 255 255;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: rgb(var(--color-surface));
      color: rgb(var(--color-on-surface));
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100dvh;
      overflow-x: hidden;
    }
    #root { min-height: 100dvh; }
    .bg-glow-orb-1 {
      position: fixed; top: -20%; left: -10%; width: 60%; height: 60%;
      border-radius: 50%; background: rgba(30, 58, 138, 0.2);
      filter: blur(120px); pointer-events: none; z-index: -1;
    }
    .bg-glow-orb-2 {
      position: fixed; top: 40%; right: -10%; width: 50%; height: 50%;
      border-radius: 50%; background: rgba(37, 99, 235, 0.1);
      filter: blur(100px); pointer-events: none; z-index: -1;
    }
    :root:not(.dark) .bg-glow-orb-1 { background: rgba(30, 58, 138, 0.06); }
    :root:not(.dark) .bg-glow-orb-2 { background: rgba(37, 99, 235, 0.04); }
  </style>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS (pre-compiled) -->
  <link rel="stylesheet" href="tailwind-out.css" />

  <!-- App Styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-surface text-on-surface font-body antialiased min-h-screen overflow-x-hidden">
  <div class="bg-glow-orb-1"></div>
  <div class="bg-glow-orb-2"></div>
  <div id="root"></div>

  <!-- Evict legacy V1 Service Worker and clear its caches -->
  <script src="sw-cleanup.js"></script>

  <!-- Local persistence layer (window.LocalStore) -->
  <script src="src/store/local-store.js"></script>

  <!-- Data Layer -->
  <script src="data.js"></script>

  <!-- Catalog accessor (window.Modules.Catalog) -->
  <script src="src/modules/catalog/ingredients.js"></script>

  <!-- Tracer (OTLP/JSON console exporter) -->
  <script src="tracer.js"></script>

  <!-- React 18 UMD -->
  <script crossorigin="anonymous" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin="anonymous" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

  <!-- Pre-compiled app (no runtime Babel — Safari safe) -->
  <script src="app.js"></script>
</body>
</html>
