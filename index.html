function emptyNutrients() {
  const n = {};
  NUTRIENT_KEYS.forEach(k => n[k] = 0);
  return n;
}

function getIngNutrients(id, qty) {
  const ing = INGREDIENTS[id];
  if (!ing) return emptyNutrients();
  const ratio = qty / ing.defaultQty;
  const n = {};
  NUTRIENT_KEYS.forEach(k => n[k] = (ing[k] || 0) * ratio);
  return n;
}

function computeMealNutrients(recipe, states) {
  if (!recipe || !states.length) return emptyNutrients();
  const hasMod = states.some((s, i) => {
    const o = recipe.ingredients[i];
    if (!o) return true;
    return s.id !== o.id || s.qty !== (INGREDIENTS[o.id]?.defaultQty ?? 1);
  });
  if (!hasMod) return { ...recipe.verifiedTotal };
  const t = { ...recipe.verifiedTotal };
  states.forEach((s, i) => {
    const o = recipe.ingredients[i];
    if (!o) return;
    const oi = INGREDIENTS[o.id];
    if (!oi) return;
    const oq = oi.defaultQty;
    if (s.id !== o.id || s.qty !== oq) {
      const on = getIngNutrients(o.id, oq);
      const nn = getIngNutrients(s.id, s.qty);
      NUTRIENT_KEYS.forEach(k => t[k] = t[k] - on[k] + nn[k]);
    }
  });
  return t;
}

function getStatus(key, value) {
  const obj = OBJECTIVES[key];
  if (!obj) return { pct:0, closed:false, label:"?" };
  const { min, max, type } = obj;
  if (type === "maximum") {
    const closed = value < max;
    const pct = Math.round((value / max) * 100);
    return { pct, closed, label: closed ? "\u2705" : pct + "% \u26A0\uFE0F" };
  }
  if (type === "minimum") {
    const closed = value >= min;
    const pct = Math.round((value / min) * 100);
    return { pct, closed, label: closed ? "\u2705" : pct + "% \u2B1C" };
  }
  if (value >= min && (max === null || value <= max))
    return { pct:100, closed:true, label:"\u2705" };
  if (value < min) {
    const pct = Math.round((value / min) * 100);
    return { pct, closed:false, label: pct + "% \u2B1C" };
  }
  const pct = Math.round((value / max) * 100);
  return { pct, closed:false, label: pct + "% \u26A0\uFE0F" };
}

function getTargetStr(key) {
  const o = OBJECTIVES[key]; if (!o) return "";
  const u = NUTRIENT_UNITS[key];
  if (o.type === "maximum") return "<" + o.max + u;
  if (o.type === "minimum") return "\u2265" + o.min + u;
  return o.min + "\u2013" + o.max + u;
}

function fmtVal(k, v) { return (Math.round(v * 10) / 10) + NUTRIENT_UNITS[k]; }

function getOpenGaps(totals) {
  const open = [];
  NUTRIENT_KEYS.forEach(k => {
    const s = getStatus(k, totals[k] || 0);
    if (!s.closed) {
      const o = OBJECTIVES[k], u = NUTRIENT_UNITS[k];
      if (o.type === "maximum") {
        open.push(NUTRIENT_LABELS[k] + " (" + (Math.round(((totals[k]||0) - o.max)*10)/10) + u + " over)");
      } else {
        open.push(NUTRIENT_LABELS[k] + " (need ~" + (Math.round((o.min - (totals[k]||0))*10)/10) + u + ")");
      }
    }
  });
  return open;
}

function NutritionCalculator() {
  const { useState, useEffect, useCallback, useMemo } = React;

  const [state, setState] = useState(() => loadState() || DEFAULT_STATE);
  const [activeRecipeId, setActiveRecipeId] = useState(null);

  const [showHistory, setShowHistory] = useState(false);
  const [expandedMeal, setExpandedMeal] = useState(null);

  const [customItem, setCustomItem] = useState({ name:"", ...emptyNutrients() });
  const [ratings, setRatings] = useState({ energy:3, digestion:3, dinnerType:"home", notes:"" });
  const [apiKey, setApiKey] = useState(() => { try { return localStorage.getItem("nutrition_calc_api_key")||""; } catch { return ""; } });
  const [showApiKeyModal, setShowApiKeyModal] = useState(false);

  const [estimateError, setEstimateError] = useState("");
  const [toastMeal, setToastMeal] = useState(null);

  const dk = state.darkMode;
  const bg = dk?PAL.bgD:PAL.bg, srf = dk?PAL.srfD:PAL.srf, bdr = dk?PAL.bdrD:PAL.bdr;
  const txt = dk?PAL.txtD:PAL.txt, mut = dk?PAL.mutD:PAL.mut;

  useEffect(() => { saveState(state); }, [state]);

  const runningTotals = useMemo(() => {
    const t = emptyNutrients();
    state.dayLog.forEach(m => NUTRIENT_KEYS.forEach(k => t[k] += (m.nutrients[k]||0)));
    t.b12 += state.fatSolubleCarryover.b12;
    t.vit_e += state.fatSolubleCarryover.vit_e;
    t.vit_d += state.fatSolubleCarryover.vit_d;
    return t;
  }, [state.dayLog, state.fatSolubleCarryover]);

  const gapsClosed = useMemo(() => {
    let c=0; NUTRIENT_KEYS.forEach(k=>{if(getStatus(k,runningTotals[k]).closed)c++}); return c;
  }, [runningTotals]);

  const allRecipes = useMemo(()=>({...RECIPES,...SUPPLEMENT_RECIPES}),[]);

  const loadRecipe = useCallback((rid) => {
    const r = {...RECIPES,...SUPPLEMENT_RECIPES}[rid]; if(!r) return;
    setActiveRecipeId(rid);
    setIngredientStates(r.ingredients.map(i=>({id:i.id, qty:INGREDIENTS[i.id]?.defaultQty||1, originalId:i.id})));
    setShowCustom(false);
  }, []);

  const addMealToDay = useCallback(() => {
    if(!activeRecipeId) return;
    const r = allRecipes[activeRecipeId]; if(!r) return;
    const nutrients = computeMealNutrients(r, ingredientStates);
    setState(p=>({...p, dayLog:[...p.dayLog,{
      id:genId(), recipeId:activeRecipeId, recipeName:r.name, emoji:r.emoji,
      ingredients:ingredientStates.map(s=>({...s})), nutrients,
      addedAt:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),
    }]}));
    setActiveRecipeId(null); setIngredientStates([]);
  }, [activeRecipeId, ingredientStates, allRecipes]);

  const addCustom = useCallback(() => {
    if(!customItem.name.trim()) return;
    const nutrients = {};
    NUTRIENT_KEYS.forEach(k => nutrients[k] = parseFloat(customItem[k])||0);
    setState(p=>({...p, dayLog:[...p.dayLog,{
      id:genId(), recipeId:"custom", recipeName:customItem.name, emoji:"\u{1F4DD}",

      addedAt:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),

    setCustomItem({name:"",...emptyNutrients()}); setShowCustom(false);
  }, [customItem]);

  const showToast = useCallback((meal) => {
    if (toastTimer) clearTimeout(toastTimer);
    setToastMeal(meal);
    const t = setTimeout(() => setToastMeal(null), 8000);

  }, [toastTimer]);

  const undoToast = useCallback(() => {
    if (!toastMeal) return;
    setState(p => ({ ...p, dayLog: p.dayLog.filter(m => m.id !== toastMeal.id) }));
    setToastMeal(null);
    if (toastTimer) clearTimeout(toastTimer);

  const editToast = useCallback(() => {
    if (!toastMeal) return;
    setState(p => ({ ...p, dayLog: p.dayLog.filter(m => m.id !== toastMeal.id) }));
    setCustomItem({ name: toastMeal.recipeName, ...toastMeal.nutrients });

  const estimateNutrients = useCallback(async () => {
    if (!customItem.name.trim()) return;
    if (!apiKey) { setShowApiKeyModal(true); return; }
    setIsEstimating(true);
    setEstimateError("");
    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 400,
          system: "You are a nutrition database. Given a food description, estimate nutritional values. Return ONLY a valid JSON object with these exact keys: protein, carbs, fat, fiber, sat_fat, epa_dha, calcium, iron, zinc, vit_d, vit_e, b12, folate, vit_c, potassium, magnesium. Units: protein/carbs/fat/fiber/sat_fat in grams, epa_dha/calcium/iron/zinc/vit_c/potassium/magnesium in mg, vit_d in IU, vit_e in mg, b12 in mcg, folate in mcg. Use USDA values. No explanation text, just the JSON object.",
          messages: [{ role: "user", content: customItem.name }],
        }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.error?.message || "API error: " + resp.status);
      }
      const data = await resp.json();
      const text = data.content?.[0]?.text || "";
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error("No JSON in response");
      const parsed = JSON.parse(jsonMatch[0]);
      const nutrients = {};
      NUTRIENT_KEYS.forEach(k => nutrients[k] = parseFloat(parsed[k]) || 0);
      const meal = {
        id: genId(), recipeId: "ai_estimate", recipeName: customItem.name, emoji: "\u{1F916}",

        addedAt: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }),

            onKeyDown:e=>{if(e.key==="Enter"&&apiKey.trim())saveApiKey(apiKey)},
            style:{width:"100%",padding:"8px 12px",border:"1px solid "+bdr,borderRadius:6,background:srf,color:txt,fontSize:14,boxSizing:"border-box",marginBottom:12,fontFamily:"monospace"}
          }),
          apiKey && React.createElement("div", {style:{marginBottom:12,fontSize:12,color:PAL.grn}},
            "\u2705 Key is set ("+apiKey.slice(0,10)+"...)"
          ),
          React.createElement("div", {style:{display:"flex",gap:8}},
            React.createElement("button", {onClick:()=>saveApiKey(apiKey),disabled:!apiKey.trim(),
              style:{...btnS(PAL.grn,PAL.grn,"#fff"),flex:1,padding:"8px 16px",opacity:apiKey.trim()?1:0.5}}, "Save Key"),
            apiKey && React.createElement("button", {onClick:()=>{clearApiKey();},
              style:{...btnS(PAL.red,PAL.red,"#fff"),padding:"8px 16px"}}, "Clear"),
            React.createElement("button", {onClick:()=>setShowApiKeyModal(false),
              style:{...btnS(srf,bdr,txt),padding:"8px 16px"}}, "Cancel")
          )
        )
      ),

      // Toast notification
      toastMeal && React.createElement("div", {style:{
        position:"fixed",bottom:20,right:20,zIndex:200,
        background:srf,border:"1px solid "+PAL.grn,borderRadius:10,
        padding:"12px 16px",boxShadow:"0 8px 30px rgba(0,0,0,0.2)",
        maxWidth:380,minWidth:280,color:txt,
        animation:"slideIn 0.3s ease-out",
      }},
        React.createElement("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}},
          React.createElement("div", null,
            React.createElement("div", {style:{fontSize:13,fontWeight:600,marginBottom:4}},
              "\u{1F916} Added: "+toastMeal.recipeName
            ),
            React.createElement("div", {style:{fontSize:12,color:mut}},
              "P:"+Math.round(toastMeal.nutrients.protein)+"g "+
              "C:"+Math.round(toastMeal.nutrients.carbs)+"g "+
              "F:"+Math.round(toastMeal.nutrients.fat)+"g"
            )
          ),
          React.createElement("button", {onClick:()=>setToastMeal(null),
            style:{background:"none",border:"none",cursor:"pointer",color:mut,fontSize:14}}, "\u2715")
        ),
        React.createElement("div", {style:{display:"flex",gap:8,marginTop:10}},
          React.createElement("button", {onClick:editToast,
            style:{...btnS(dk?PAL.bluBgD:PAL.bluBg,PAL.blu,PAL.blu),flex:1,textAlign:"center",fontSize:12}}, "\u270F\uFE0F Edit values"),
          React.createElement("button", {onClick:undoToast,
            style:{...btnS(dk?PAL.redBgD:PAL.redBg,PAL.red,PAL.red),flex:1,textAlign:"center",fontSize:12}}, "\u21A9\uFE0F Undo")
        )
      )
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(NutritionCalculator));
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
