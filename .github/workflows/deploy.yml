name: Deploy V2 to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Tailwind CSS
        working-directory: v2
        run: npm init -y && npm install tailwindcss @tailwindcss/forms @tailwindcss/container-queries

      - name: Build Tailwind CSS
        working-directory: v2
        run: npx tailwindcss -i input.css -o tailwind-out.css --minify

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: v2

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
