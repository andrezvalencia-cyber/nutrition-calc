name: Capture Perf Baseline

# Manual only. Runs the perf benchmark without --compare on CI hardware
# (matching the perf-gate environment) and commits the resulting
# v2/tests/perf-baseline.json to main. The commit carries [skip ci]
# so it does not re-trigger deploy.yml.
#
# Use this when:
#   - Bootstrapping the first CI-calibrated baseline.
#   - An intentional perf change (e.g. new feature with larger payload)
#     means the old baseline is no longer representative.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install v2 dependencies
        working-directory: v2
        run: npm install

      - name: Install Playwright browsers
        working-directory: v2
        run: npx playwright install --with-deps chromium

      - name: Build Tailwind CSS
        working-directory: v2
        run: npx tailwindcss -i input.css -o tailwind-out.css --minify

      - name: Compile JSX (v2)
        working-directory: v2
        run: npm run build

      - name: Start static server
        working-directory: v2
        run: npx serve -p 8765 >/tmp/serve.log 2>&1 &

      - name: Wait for server
        run: |
          for i in $(seq 1 20); do
            curl -sSf http://localhost:8765/ >/dev/null && exit 0
            sleep 0.5
          done
          echo "Server failed to start" && cat /tmp/serve.log && exit 1

      - name: Capture baseline
        working-directory: v2
        env:
          PERF_RUNS: "7"
        run: node tests/perf-benchmark.js

      - name: Commit baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet v2/tests/perf-baseline.json; then
            echo "Baseline unchanged; nothing to commit."
            exit 0
          fi
          git add v2/tests/perf-baseline.json
          git commit -m "chore(perf): refresh CI-calibrated baseline [skip ci]"
          git push origin HEAD:main
